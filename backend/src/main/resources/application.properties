# ─── Server ───────────────────────────────────────
server.port=8080

# ─── MySQL Database ───────────────────────────────
# STEP 1: Replace with your MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/aura_gallery?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Tandel
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload ──────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── File Storage Directory ───────────────────────
# Change this path to wherever you want to store uploaded images
aura.upload.dir=./uploads

# ─── JWT Secret (change this to a long random string in production!) ──
aura.jwt.secret=AuraGallerySecretKey2025ChangeThisInProductionPlease
aura.jwt.expiration=86400000

# ─── CORS ─────────────────────────────────────────
aura.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500
